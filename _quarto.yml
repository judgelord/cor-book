execute:
  cache: true
  # freeze: auto # once the results are locked in, turn this on so that we don't need to re-render
  echo: false
  message: false
  warning: false

project:
  type: book
  output-dir: docs
  render:
    - "!interbranch.qmd" # ! = things to not render
    - "!code/"
    - "!replication*"
    - "!archive/"
    - "!feedback/"
    - "!README"

book:
  title: "Unequal Interbranch Representation"
  author: "Devin Judge-Lord, Eleanor Powell, Rochelle Snyder"
  date: today
  cover-image: assets/cover.png
  chapters:
     - index.md
     - acknowledgements.md
     - ch1.qmd
     - ch2.qmd
     - ch3.qmd
     - ch4.qmd
     - ch5.qmd
     - ch6.qmd
     - ch7.qmd
     - ch8.qmd
     - ch9.qmd
     - ch10.qmd
     - references.md
  appendices:
     - Appendix.qmd
  search: true
  #repo-url: https://github.com/judgelord/cor-book
  downloads: pdf # [pdf, epub]

number-depth: 3

#crossref: ## Commenting this out to try just renaming the theorum function
  # chapters: false # this removes chapter numbers ahead of all figures and tables, so we don't want to do this
#  custom:
#    - key: hyp
#      kind: float
#      reference-prefix: Hypothesis #TODO decide if we want to call this Hypothesis or Expectation
#      caption-location: top
#      latex-env: hypothesis # This is required for PDF format
      # hyp-labels: "" # seems not possible to remove numbering in custom crossref floats
language:
  crossref-thm-title: "Hypothesis"
bibliography: assets/cor.bib

format:
  html:
    # theme: cosmo
    self-contained: false # why does this make the files so large? (77MB!)
    #css: styles.css
  pdf:
    #documentclass: scrreprt. # why this rather than book?
    number-depth: 2
    include-in-header:
       - assets/header.tex
    #pdf-engine: pdflatex. # pdflatex is faster, but perhaps not as good as lulatex

    # include-after-body:
    #   text: |
    #     \printindex
  # epub:
  #    cover-image: assets/cover.png

book-content: true # we are not really using this and could delete this after removing all of the book content chunk fences
