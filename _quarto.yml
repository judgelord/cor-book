execute:
  cache: true
  freeze: true
  echo: false
  message: false
  warning: false

project:
  type: book
  output-dir: docs
  render:
    - "!interbranch.qmd"
    - "!code/"
    - "!replication-total"
    - "!archive/"
    - "!feedback/"
    - "!README"

book:
  title: "Unequal Interbranch Representation"
  author: "Devin Judge-Lord, Eleanor Powell, Rochelle Snyder"
  date: today
  cover-image: assets/cover.png
  chapters:
     - index.md
     - acknowledgements.md
     - ch1.qmd
     - ch2.qmd
     - ch3.qmd
     - ch4.qmd
     - ch5.qmd
     - ch6.qmd
     - ch7.qmd
     - ch8.qmd
     - ch9.qmd
     - ch10.qmd
     - references.md
  appendices:
     - Appendix.qmd
  search: true
  #repo-url: https://github.com/judgelord/cor-book
  downloads: pdf # [pdf, epub]

number-depth: 3

bibliography: assets/cor.bib

format:
  html:
    # theme: cosmo
    self-contained: false # why does this make the files so large? (77MB!)
  pdf:
    #documentclass: scrreprt. # why this rather than book?
    number-depth: 2
    include-in-header:
       - assets/header.tex
    # include-after-body:
    #   text: |
    #     \printindex
  # epub:
  #    cover-image: assets/cover.png

book-content: true
